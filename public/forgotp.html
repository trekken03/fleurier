<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="icon" href="images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/forgotp.css">
</head>

<body class="forgotp d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-light navbar-bg">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="index.html">
        <img src="images/icon.png" width="40" height="40" class="d-inline-block align-text-center">
        Fleurier
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="btn btn-danger ms-2" href="login.html">Login</a></li>
          <li class="nav-item"><a class="btn btn-danger ms-2" href="registration.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-main d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow forgot-card">
      <h3 class="text-center mb-3 fw-bold">Forgot Password</h3>
      <p class="text-center text-muted mb-4">Enter your email and we'll send you a reset link.</p>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <button type="button" class="btn-custom w-100 mt-3" id="sendResetBtn">Send Reset Link</button>
      <p class="text-center mt-3">
        Remember your password? <a href="login.html" class="text-custom-link">Back to Login</a>
      </p>
    </div>
  </main>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
    <div id="resetToast" class="toast text-white" role="alert" aria-live="assertive" aria-atomic="true"
      data-bs-autohide="true" data-bs-delay="3500">
      <div class="toast-body" id="resetToastBody"></div>
    </div>
  </div>

  <footer class="text-center text-dark py-3 mt-auto footer-bg">
    <p class="mb-0">&copy; 2025 Fleurier. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/forgotp.js"></script>
</body>

</html>
