<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My profile</title>
    <link rel="icon" href="images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/profile.css">
</head>

<body style="background-color: #fbfaf9; min-height: 100vh; display: flex; flex-direction: column;">

    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #d0b9b6;">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                <img src="images/icon.png" alt="Fleurier Logo" width="40" height="40"
                    class="d-inline-block align-text-center">
                Fleurier
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
                    <li class="nav-item" id="navLogin"><a class="btn btn-danger ms-2 mb-2" href="login.html">Login</a>
                    </li>
                    <li class="nav-item" id="navRegister"><a class="btn btn-danger ms-2 mb-2"
                            href="registration.html">Register</a></li>
                    <li class="nav-item d-none" id="navGreeting">
                        <a class="nav-link text-white fw-bold" href="profile.html" id="navGreetingText"></a>
                    </li>
                    <li class="nav-item d-none" id="navCart">
                        <a class="nav-link text-white" href="cart.html"><i
                                class="fa-solid fa-cart-shopping fa-xl"></i></a>
                    </li>
                    <li class="nav-item d-none" id="navLogout">
                        <a class="btn btn-danger ms-2" href="#" id="logoutBtn">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="d-flex align-items-center mb-4">
                    <div class="profile-avatar me-4">
                        <i class="fas fa-user-circle fa-5x" style="color: #d0b9b6;"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-1" id="profileName">—</h2>
                        <span class="badge bg-danger" id="profileRole">user</span>
                    </div>
                </div>

                <div class="row g-4">

                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-4">
                                    <i class="fas fa-user me-2" style="color: #d0b9b6;"></i>Personal Information
                                </h5>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Full Name</label>
                                    <input type="text" class="form-control" id="editFullname" placeholder="Full name">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Email Address</label>
                                    <input type="email" class="form-control" id="editEmail" placeholder="Email address"
                                        disabled>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Phone Number</label>
                                    <input type="tel" class="form-control" id="editPhone" placeholder="Phone number">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small">Address</label>
                                    <input type="text" class="form-control" id="editAddress" placeholder="Address">
                                </div>
                                <button class="btn btn-danger w-100" id="saveProfileBtn">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-4">
                                    <i class="fas fa-shopping-bag me-2" style="color: #d0b9b6;"></i>Order History
                                </h5>
                                <div id="orderHistoryList">
                                    <p class="text-muted text-center py-3">No orders yet.</p>
                                </div>
                            </div>
                        </div>


                        <div class="card shadow-sm mt-4 mb-4">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-4">
                                    <i class="fas fa-envelope me-2" style="color: #d0b9b6;"></i>My Messages
                                </h5>
                                <div id="myMessagesList">
                                    <p class="text-muted text-center py-3">No messages sent yet.</p>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-4">
                                    <i class="fas fa-lock me-2" style="color: #d0b9b6;"></i>Change Password
                                </h5>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Current Password</label>
                                    <input type="password" class="form-control" id="currentPassword"
                                        placeholder="Enter current password">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">New Password</label>
                                    <input type="password" class="form-control" id="newPassword"
                                        placeholder="Enter new password">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirmNewPassword"
                                        placeholder="Confirm new password">
                                </div>
                                <button class="btn btn-outline-danger w-100" id="changePasswordBtn">
                                    <i class="fas fa-key me-2"></i>Change Password
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="profileToast" class="toast text-white" role="alert" aria-live="assertive" aria-atomic="true"
            data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-body" id="profileToastBody"></div>
        </div>
    </div>

    <footer class="text-center text-dark py-3 mt-auto" style="background-color: #f8d7da;">
        <p class="mb-0">&copy; 2025 Fleurier. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
