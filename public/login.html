<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" href="images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/login.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-light navbar-bg">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="index.html">
        <img src="images/icon.png" width="40" height="40" class="d-inline-block align-text-center">
        Fleurier
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="btn btn-danger ms-2" href="registration.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-main d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow">
      <h3 class="text-center mb-3 fw-bold">Login</h3>
      <p class="text-center text-muted mb-4">Welcome back to Fleurier</p>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
      </div>
      <div class="d-flex justify-content-between mb-3">
        <a href="forgotp.html" class="text-custom-link">Forgot Password?</a>
      </div>
      <button type="button" class="btn-custom w-100 mt-2" id="loginBtn">Login</button>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="mx-2 text-muted small">or</span>
        <hr class="flex-grow-1">
      </div>

      <a href="/api/auth/google" class="btn w-100 d-flex align-items-center justify-content-center gap-2"
        style="border:1.5px solid #dee2e6; background:#fff; color:#444; border-radius:50px; padding:8px 20px; font-weight:500; transition:all 0.2s;">
        <img src="https://developers.google.com/identity/images/g-logo.png" width="20" height="20" alt="Google">
        Continue with Google
      </a>

      <p class="text-center mt-3">
        Don't have an account? <a href="registration.html" class="text-custom-link">Register here</a>
      </p>
    </div>
  </main>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
    <div id="loginToast" class="toast text-white" role="alert" aria-live="assertive" aria-atomic="true"
      data-bs-autohide="true" data-bs-delay="3000">
      <div class="toast-body" id="loginToastBody"></div>
    </div>
  </div>

  <footer class="text-center text-dark py-3 footer-bg mt-auto">
    <p class="mb-0">&copy; 2025 Fleurier. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
