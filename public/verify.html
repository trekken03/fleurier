<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — Fleurier</title>
    <link rel="icon" href="images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f3e6e3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        .navbar-bg {
            background-color: #d0b9b6;
        }

        .footer-bg {
            background-color: #f8d7da;
        }

        .verify-card {
            width: 420px;
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            border: 2px solid #d0b9b6;
            border-radius: 10px;
            outline: none;
            color: #3a2a2a;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            border-color: #b89c99;
            box-shadow: 0 0 0 0.2rem rgba(208, 185, 182, 0.3);
        }

        .btn-custom {
            background-color: #d62c1a;
            color: white;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: bold;
            border: none;
            transition: background-color 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #e09191;
            color: white;
        }

        .text-custom-link {
            color: #e09191;
            text-decoration: none;
            cursor: pointer;
        }

        .text-custom-link:hover {
            color: #d62c1a;
            text-decoration: underline;
        }

        .email-badge {
            background-color: #f3e6e3;
            border: 1px solid #d0b9b6;
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.85rem;
            color: #987069;
            display: inline-block;
        }

        #countdown {
            color: #d0b9b6;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-bg">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                <img src="images/icon.png" width="40" height="40" class="me-2">Fleurier
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-4">
        <div class="card p-4 verify-card">
            <div class="text-center mb-3">
                <i class="fas fa-envelope-open-text fa-3x mb-3" style="color:#d0b9b6;"></i>
                <h3 class="fw-bold">Verify your Email</h3>
                <p class="text-muted small mb-2">We sent a 6-digit code to</p>
                <span class="email-badge" id="emailDisplay">your email</span>
            </div>

            <div class="code-inputs">
                <input type="text" maxlength="1" class="code-input" id="c1">
                <input type="text" maxlength="1" class="code-input" id="c2">
                <input type="text" maxlength="1" class="code-input" id="c3">
                <input type="text" maxlength="1" class="code-input" id="c4">
                <input type="text" maxlength="1" class="code-input" id="c5">
                <input type="text" maxlength="1" class="code-input" id="c6">
            </div>

            <button class="btn-custom w-100 mt-2" id="verifyBtn">
                <i class="fas fa-check-circle me-2"></i>Verify Email
            </button>

            <div class="text-center mt-3">
                <p class="text-muted small mb-1">Code expires in <span id="countdown">10:00</span></p>
                <p class="small">Didn't receive a code?
                    <span class="text-custom-link" id="resendBtn">Resend Code</span>
                </p>
            </div>

            <p class="text-center mt-2 small">
                <a href="registration.html" class="text-custom-link">← Back to Register</a>
            </p>
        </div>
    </main>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
        <div id="verifyToast" class="toast text-white" role="alert" data-bs-autohide="true" data-bs-delay="3500">
            <div class="toast-body" id="verifyToastBody"></div>
        </div>
    </div>

    <footer class="text-center text-dark py-3 footer-bg">
        <p class="mb-0">&copy; 2025 Fleurier. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get email from URL param
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || 'your email';
        document.getElementById('emailDisplay').textContent = email;

        // Auto-focus and jump between inputs
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, i) => {
            input.addEventListener('input', function () {
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value && i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            });
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Backspace' && !this.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });
            input.addEventListener('paste', function (e) {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                pasted.split('').forEach((char, idx) => {
                    if (inputs[idx]) inputs[idx].value = char;
                });
                if (inputs[pasted.length - 1]) inputs[pasted.length - 1].focus();
            });
        });

        function getCode() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        function showToast(message, type = 'danger') {
            const toastEl = document.getElementById('verifyToast');
            const toastBody = document.getElementById('verifyToastBody');
            toastEl.className = `toast text-white bg-${type}`;
            toastBody.textContent = message;
            bootstrap.Toast.getOrCreateInstance(toastEl).show();
        }

        // Countdown timer
        let seconds = 600;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            countdownEl.textContent = `${m}:${s}`;
            if (seconds <= 0) {
                clearInterval(timer);
                countdownEl.textContent = 'Expired';
                countdownEl.style.color = '#dc3545';
            }
        }, 1000);

        // Verify button
        document.getElementById('verifyBtn').addEventListener('click', async function () {
            const code = getCode();
            if (code.length < 6) {
                showToast('Please enter the complete 6-digit code.');
                return;
            }

            try {
                const res = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Email verified! Redirecting to login...', 'success');
                    clearInterval(timer);
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showToast(data.message || 'Invalid code. Please try again.');
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                }
            } catch (err) {
                showToast('Could not connect to server. Please try again.');
            }
        });

        // Resend button
        document.getElementById('resendBtn').addEventListener('click', async function () {
            try {
                const res = await fetch('/api/auth/resend-code', {
                    method: 'POST',
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.success) {
                    showToast('New code sent! Check your email.', 'success');
                    seconds = 600;
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                } else {
                    showToast(data.message || 'Failed to resend code.');
                }
            } catch (err) {
                showToast('Could not connect to server.');
            }
        });

        // Focus first input on load
        inputs[0].focus();
    </script>
</body>

</html>
