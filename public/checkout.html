<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/checkout.css">
</head>

<body>

    <nav class="minimal-nav" style="background-color: #d0b9b6;">
        <div class="checkout-container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                <img src="images/icon.png" alt="Fleurier Logo" width="40" height="40"
                    class="d-inline-block align-text-center"> Fleurier
            </a>
            <div class="d-flex align-items-center">
                <a href="cart.html" class="text-decoration-none me-3" style="color: var(--text-color);">
                    <i class="fas fa-arrow-left me-1"></i> Back to Cart
                </a>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <div class="row">
            <div class="col-lg-8">
                <div id="customerForm">
                    <div class="checkout-section">
                        <div class="section-content">
                            <h5 class="section-header">Customer Information</h5>
                            <div class="mb-3">
                                <label for="fullname" class="form-label required">Full Name</label>
                                <input type="text" class="form-control" id="fullname" name="fullname" disabled="true"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" disabled>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label required">Phone Number</label>
                                <input type="tel" maxlength="11" class="form-control" id="phone" name="phone"
                                    pattern="[0-9]{10,11}" placeholder="Enter your phone number" required>
                            </div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <div class="section-content">
                            <h5 class="section-header">Delivery Address</h5>
                            <div class="mb-3">
                                <label for="address" class="form-label required">Address</label>
                                <input type="text" class="form-control" id="address" name="address"
                                    placeholder="Please enter a valid address" required>
                            </div>
                            <div class="mb-3">
                                <label for="additionalInfo" class="form-label">Additional Information (Optional)</label>
                                <textarea class="form-control" id="additionalInfo" name="additionalInfo" rows="2"
                                    placeholder="Landmarks, building name, floor, unit number, etc."></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <div class="section-content">
                            <h5 class="section-header">Delivery</h5>
                            <div class="mb-4">
                                <label for="deliveryInstructions" class="form-label">Special Instructions
                                    (Optional)</label>
                                <textarea class="form-control" id="deliveryInstructions" rows="2"
                                    placeholder="Any special delivery instructions?"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <div class="section-content">
                            <h5 class="section-header">Shipping & Payment</h5>
                            <div class="mb-4">
                                <h6 class="mb-3" style="font-weight: 500;">Shipping Method</h6>
                                <div class="payment-option">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="shippingMethod"
                                            id="standardLocal" value="standard" checked>
                                        <label class="form-check-label w-100" for="standardLocal">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <div style="font-weight: 500;">Standard Local (Door to Door)</div>
                                                    <div class="small text-muted">Delivery within 2-3 business days
                                                    </div>
                                                </div>
                                                <span style="font-weight: 500;">₱100</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                                <div class="payment-option">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="shippingMethod" id="pickup"
                                            value="pickup">
                                        <label class="form-check-label w-100" for="pickup">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <div style="font-weight: 500;">Pick Up</div>
                                                    <div class="small text-muted">Collect from our store at your
                                                        convenience</div>
                                                </div>
                                                <span style="font-weight: 500; color: #28a745;">Free</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-divider"></div>
                            <div>
                                <h6 class="mb-3" style="font-weight: 500;">Payment Method</h6>
                                <div class="payment-option">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="paymentMethod"
                                            id="cashOnDelivery" value="cod" checked>
                                        <label class="form-check-label" for="cashOnDelivery">
                                            <div style="font-weight: 500;">Cash on Delivery</div>
                                            <div class="small text-muted">Pay when you receive your order</div>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="order-summary-container">
                    <div class="order-summary-header">Order Summary</div>
                    <div class="p-3" id="checkoutItems">
                        <div class="text-center text-muted py-3">Loading cart...</div>
                    </div>
                    <div class="order-summary-footer">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>₱<span id="checkoutSubtotal">0.00</span></span>
                        </div>
                        <div class="summary-row">
                            <span>Delivery Fee</span>
                            <span>₱<span id="deliveryFee">100.00</span></span>
                        </div>
                        <div class="summary-row summary-total">
                            <span>Total</span>
                            <span>₱<span id="checkoutTotal">0.00</span></span>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-primary w-100 py-3" id="placeOrderBtn" type="button">PLACE
                                ORDER</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="errorToast" class="toast bg-danger text-white" role="alert" aria-live="assertive" aria-atomic="true"
            data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-body" id="errorToastBody">Something went wrong.</div>
        </div>
        <div id="successToast" class="toast bg-success text-white" role="alert" aria-live="assertive" aria-atomic="true"
            data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-body" id="successToastBody">Order placed successfully!</div>
        </div>
    </div>

    <footer class="minimal-footer">
        <div class="checkout-container text-center">
            <p class="mb-0">&copy; 2025 Fleurier. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/checkout.js"></script>
</body>

</html>
